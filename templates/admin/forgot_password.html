{% extends "base.html" %}
{% block title %}Forgotten Password — VIP Promotions{% endblock %}
{% block content %}
<div class="login-container">
    <p class="login-title">Forgotten Password</p>
    <form method="POST" action="{{ url_for('admin_forgot_password') }}">
        <div class="field-group">
            <div class="field-row">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email" autocomplete="email">
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
    </form>
    <div style="text-align: center; margin-top: 16px;">
        <a href="{{ url_for('admin_login') }}" style="font-size: 0.85rem; color: var(--accent);">Back to Login</a>
    </div>
</div>
{% endblock %}
