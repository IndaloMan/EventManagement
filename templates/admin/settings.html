{% extends "base.html" %}
{% block title %}Settings — {{ app_settings.promo_display_name }}{% endblock %}
{% block content %}
<p class="section-title">Promotions Company</p>

<form method="POST" action="{{ url_for('admin_settings') }}" data-track-changes>
    <div class="field-group">
        <div class="field-row">
            <label>Display name <span style="color: var(--danger);">*</span></label>
            <input type="text" name="promo_display_name" value="{{ settings.promo_display_name or '' }}"
                   maxlength="24" required placeholder="Max 24 characters">
        </div>
        <div class="field-row">
            <label>Full name</label>
            <input type="text" name="promo_full_name" value="{{ settings.promo_full_name or '' }}"
                   placeholder="Optional">
        </div>
        <div class="field-row">
            <label>Description</label>
            <textarea name="promo_description" rows="3"
                      placeholder="Optional">{{ settings.promo_description or '' }}</textarea>
        </div>
    </div>

    <p class="section-title" style="margin-top: 24px;">Email Settings</p>

    <div class="field-group">
        <div class="field-row">
            <label>Email address</label>
            <input type="email" name="smtp_email" value="{{ settings.smtp_email or '' }}"
                   placeholder="{{ 'Currently set' if settings.smtp_email else 'Optional' }}">
        </div>
        <div class="field-row">
            <label>App password</label>
            <input type="password" name="smtp_password" value=""
                   autocomplete="new-password"
                   placeholder="{{ 'Leave blank to keep current' if settings.smtp_password else 'Optional' }}">
        </div>
        <div class="field-row">
            <label>Friendly name</label>
            <input type="text" name="smtp_from_name" value="{{ settings.smtp_from_name or '' }}"
                   placeholder="e.g. Marina Club Events">
        </div>
    </div>
    <p style="font-size: 0.78rem; color: var(--text3); margin: -8px 0 16px;">
        Friendly name appears in the sender field in Outlook and Gmail (e.g. "Marina Club Events &lt;email@address&gt;").
    </p>

    <button type="submit" class="btn btn-primary" style="opacity: 0.45;" id="saveBtn">Save Settings</button>
</form>

<script>
(function() {
    var form = document.querySelector('[data-track-changes]');
    var btn = document.getElementById('saveBtn');
    if (!form || !btn) return;
    var dirty = false;
    form.querySelectorAll('input, textarea, select').forEach(function(el) {
        el.addEventListener('input', function() {
            dirty = true;
            btn.style.opacity = '1';
            btn.classList.add('btn-success');
            btn.classList.remove('btn-primary');
        });
    });
    function warnBeforeLeave(e) {
        if (dirty) { e.preventDefault(); e.returnValue = ''; }
    }
    window.addEventListener('beforeunload', warnBeforeLeave);
    form.addEventListener('submit', function() {
        dirty = false;
    });
})();
</script>
{% endblock %}
