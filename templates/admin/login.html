{% extends "base.html" %}
{% block title %}{{ app_settings.promo_display_name }} Login{% endblock %}
{% block content %}
<div class="login-container">
    <p class="login-title">{{ app_settings.promo_display_name }} Login</p>
    <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="field-group">
            <div class="field-row">
                <label for="username">User</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your email">
            </div>
            <div class="field-row">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
    <div style="text-align: center; margin-top: 16px;">
        <a href="{{ url_for('admin_forgot_password') }}" style="font-size: 0.85rem; color: var(--accent);">Forgotten password?</a>
    </div>
</div>
{% endblock %}
