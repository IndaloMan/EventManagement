<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve Tickets</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="embed-mode">
    <div id="app">
        <main id="content">
            {% if event %}
            <h2 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 12px;">{{ event.title }}</h2>
            <p style="font-size: 0.85rem; color: var(--text2);">{{ event.start_time.strftime('%A %d %B %Y, %H:%M') }}</p>
            {% if event.price > 0 %}
            <div class="event-price">&euro;{{ "%.2f"|format(event.price) }} per person</div>
            {% endif %}
            <form method="POST" action="{{ url_for('reserve', event_id=event.id) }}" target="_top">
                <div class="field-group" style="margin-top: 12px;">
                    <div class="field-row">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Full name" required>
                    </div>
                    <div class="field-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Optional">
                    </div>
                    <div class="field-row">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone" placeholder="Phone number" required>
                    </div>
                    <div class="field-row">
                        <label for="num_tickets">Tickets</label>
                        <select id="num_tickets" name="num_tickets">
                            {% for i in range(1, 11) %}<option value="{{ i }}">{{ i }}</option>{% endfor %}
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-success">Confirm Reservation</button>
            </form>
            {% else %}
            <p style="color: var(--text3); text-align: center; padding: 20px;">Event not available.</p>
            {% endif %}
        </main>
    </div>
</body>
</html>
